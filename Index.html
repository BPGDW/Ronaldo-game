  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #006400, #b30000);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }
    .game-container {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 20px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      text-align: center;
    }
    .scene-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 20px;
      background: #333;
    }
    .scene-text {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 25px;
      min-height: 80px;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .choice-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }
    .choice-btn:hover {
      background: rgba(255,255,255,0.3);
      border-color: #ffd700;
    }
    .choice-btn:active {
      transform: scale(0.97);
    }
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .result-screen h2 {
      font-size: 32px;
      text-shadow: 0 0 20px gold;
    }
    .result-screen .result-image {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid gold;
    }
    .send-btn {
      background: #ffd700;
      color: #000;
      border: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .send-btn:hover {
      background: #ffea70;
    }
  </style>
</head>

      const scene = scenes[key];

      sceneScreen.style.display = 'block';
      resultScreen.style.display = 'none';

      sceneImage.src = scene.image;
      sceneText.textContent = scene.text;
      choicesContainer.innerHTML = '';

      if (scene.choices && scene.choices.length > 0) {
        scene.choices.forEach((choice, index) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = choice.text;
          btn.addEventListener('click', () => {
            if (choice.next) {
              showScene(choice.next);
            }
          });
          choicesContainer.appendChild(btn);
        });
      } else if (scene.result) {
        // Показать результат
        showResult(scene.result);
      }
    }

    function showResult(result) {
      sceneScreen.style.display = 'none';
      resultScreen.style.display = 'flex';
      resultImage.src = result.image;
      resultTitle.textContent = result.title;
      resultMessage.textContent = result.message;
      // Сохраняем результат для отправки
      resultScreen.dataset.win = result.win ? 'win' : 'lose';
    }

    // Отправка данных боту
    sendResultBtn.addEventListener('click', () => {
      const winStatus = resultScreen.dataset.win === 'win' ? 'win' : 'lose';
      const data = JSON.stringify({
        game: 'ronaldo_wc2026',
        result: winStatus
      });
      tg.sendData(data);
      tg.close();

    // Запуск
